<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyStore</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="5" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="6" cy="9" r="1.5" fill="currentColor"/>
          <path d="M11 9h5M14 7v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>KeyStore</span>
      </div>
      <nav class="tabs">
        <button class="tab" data-mode="search" title="Alt+1">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.5 8.5L11 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Search
        </button>
        <button class="tab" data-mode="add" title="Alt+2">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Add
        </button>
        <button class="tab" data-mode="upload" title="Alt+3">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9v2h9V9M6.5 2v6M4 4.5L6.5 2 9 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Upload
        </button>
        <button class="tab" data-mode="manage" title="Alt+4">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="2" y="2" width="9" height="9" stroke="currentColor" stroke-width="1.3"/><path d="M4 6.5h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          Manage
        </button>
      </nav>
    </header>

    <main class="panel-wrap">
      <!-- SEARCH PANEL -->
      <section id="panel-search" class="panel hidden">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input id="search-input" type="text" placeholder="Type a key…" autocomplete="off" spellcheck="false" />
        </div>
        <div id="search-results" class="results-list"></div>
        <p id="search-empty" class="empty-hint hidden">No keys found.</p>
        <div id="copy-toast" class="toast hidden">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Value copied — press Ctrl+V to paste
        </div>
      </section>

      <!-- ADD PANEL -->
      <section id="panel-add" class="panel hidden">
        <div class="form-group">
          <label for="add-key">Key</label>
          <input id="add-key" type="text" placeholder="e.g. api_key_prod" autocomplete="off" spellcheck="false" />
        </div>
        <div class="form-group">
          <label for="add-value">Value</label>
          <textarea id="add-value" rows="3" placeholder="Enter value…" spellcheck="false"></textarea>
        </div>
        <div id="conflict-box" class="conflict hidden">
          <p class="conflict-title">Key already exists</p>
          <div id="conflict-entries"></div>
          <div class="conflict-actions">
            <label class="radio-opt">
              <input type="radio" name="conflict" value="overwrite" checked /> Overwrite selected
            </label>
            <label class="radio-opt">
              <input type="radio" name="conflict" value="new" /> Save as new entry
            </label>
          </div>
        </div>
        <button id="add-save-btn" class="btn-primary">Save</button>
        <div id="add-toast" class="toast hidden">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Saved!
        </div>
      </section>

      <!-- UPLOAD PANEL -->
      <section id="panel-upload" class="panel hidden">
        <div id="drop-zone" class="drop-zone">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="3" y="5" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.3"/><path d="M9 14h10M14 10v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <p class="drop-main">Drop CSV or Excel here</p>
          <p class="drop-sub">or <label for="file-input" class="file-link">browse file</label></p>
          <input id="file-input" type="file" accept=".csv,.xlsx,.xls" hidden />
        </div>
        <div id="upload-format-hint" class="format-hint">
          First row must be headers: <code>key</code> and <code>value</code>
        </div>
        <div id="upload-result" class="upload-result hidden"></div>
      </section>

      <!-- MANAGE PANEL -->
      <section id="panel-manage" class="panel hidden">
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input id="manage-search" type="text" placeholder="Search key…" autocomplete="off" spellcheck="false" />
        </div>
        <div id="manage-list" class="results-list"></div>
        <p id="manage-empty" class="empty-hint hidden">No entries found.</p>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
